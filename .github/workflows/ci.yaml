name: ci

on:
  push:
    branches:
      - main
    paths:
      - "src/**/*.ts"
      - "tests/**/*.ts"
      - "scripts/**/*.ts"
      - "package.json"
      - "bun.lock"
      - "knip.ts"
      - "tsconfig*.json"
      - "vitest.config.ts"
      - ".oxlintrc.json"
      - "biome.jsonc"
  pull_request:
    paths:
      - "src/**/*.ts"
      - "tests/**/*.ts"
      - "scripts/**/*.ts"
      - "package.json"
      - "bun.lock"
      - "knip.ts"
      - "tsconfig*.json"
      - "vitest.config.ts"
      - ".oxlintrc.json"
      - "biome.jsonc"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rokit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install
        run: bun ci

      - name: Biome CI
        run: bun run biome:ci

      - name: Lint
        run: bun run oxc .

      - name: Type Checking
        run: bun run type-check

      - name: Knip
        run: bun run knip

      - name: Build
        run: bun run build

      - name: Assert build artifacts exist
        run: |
          if [ ! -d dist ]; then
            echo "::error title=Missing output::dist directory not found" >&2
            exit 1
          fi
          if [ ! -f dist/index.js ]; then
            echo "::error title=Missing artifact::dist/index.js not found" >&2
            ls -R dist || true
            exit 1
          fi
          echo "Build artifacts OK"

      - name: Tests
        run: bun run test
