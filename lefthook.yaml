commit-msg:
  jobs:
    - name: commitlint
      run: bun x --bun commitlint --edit {1}

min_version: 2.1.4

post-merge:
  jobs:
    - name: bun-install
      run: bun install

pre-commit:
  jobs:
    - glob:
        - "*.css"
        - "*.html"
        - "*.json"
        - "*.jsonc"
        - "*.grit"
        - "*.code-workspace"
      name: biome-json
      run: bun run biome:check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    - glob:
        - "*.js"
        - "*.jsx"
        - "*.ts"
        - "*.tsx"
      name: js-ts-fix
      run: |
        bun run oxc --fix {staged_files}
        bun run biome:check --write --no-errors-on-unmatched {staged_files}
        bun run format {staged_files}
      stage_fixed: true

    - glob:
        - "*.json5"
        - "*.mdx"
      name: format-json5-mdx
      run: bun run format {staged_files}
      stage_fixed: true

    - glob: "*.md"
      name: md-fix
      run: |
        rumdl check --fix {staged_files}
        rumdl fmt {staged_files}
      stage_fixed: true

    - glob: "*.toml"
      name: toml-fix
      run: |
        tombi lint {staged_files}
        tombi format {staged_files}
      stage_fixed: true

    - glob:
        - "*.yaml"
        - "*.yml"
      name: yaml-format
      run: bun run format {staged_files}
      stage_fixed: true
  parallel: true

pre-push:
  jobs:
    - name: biome-ci
      run: |
        if echo {push_files} | grep -qE '\.(css|html|json|jsonc|grit|code-workspace|js|jsx|ts|tsx)$'; then
          bun run biome:ci
        fi

    - name: oxc
      run: |
        if echo {push_files} | grep -qE '\.(js|jsx|ts|tsx)$'; then
          bun run build:oxc --minify
          bun run build
          bun run oxc .
        fi

    - name: type-check
      run: |
        if echo {push_files} | grep -qE '\.(ts|tsx|js|jsx|json|jsonc)$'; then
          bun run type-check
        fi

    - name: knip
      run: |
        if echo {push_files} | grep -qE '\.(ts|tsx|js|jsx|json|jsonc|toml)$'; then
          bun run knip
        fi

    - name: test
      run: |
        if echo {push_files} | grep -qE '\.(ts|tsx|js|jsx|json|jsonc|toml)$'; then
          bun run test
        fi
  parallel: true
