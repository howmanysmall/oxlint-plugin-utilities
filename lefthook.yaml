commit-msg:
  jobs:
    - name: commitlint
      run: bun x --bun commitlint --edit {1}

min_version: 2.1.4

post-merge:
  jobs:
    - name: bun-install
      run: bun install

pre-commit:
  jobs:
    - glob:
        - "*.css"
        - "*.html"
        - "*.json"
        - "*.jsonc"
        - "*.grit"
        - "*.code-workspace"
      name: biome-json
      run: bun run biome:check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    - glob:
        - "*.js"
        - "*.jsx"
        - "*.ts"
        - "*.tsx"
      name: js-ts-fix
      run: |
        bun run oxc --fix {staged_files}
        bun run biome:check --write --no-errors-on-unmatched {staged_files}
        bun run format {staged_files}
      stage_fixed: true

    - glob:
        - "*.json5"
        - "*.mdx"
      name: format-json5-mdx
      run: bun run format {staged_files}
      stage_fixed: true

    - glob: "*.md"
      name: md-fix
      run: |
        rumdl check --fix {staged_files}
        rumdl fmt {staged_files}
      stage_fixed: true

    - glob: "*.toml"
      name: toml-fix
      run: |
        tombi lint {staged_files}
        tombi format {staged_files}
      stage_fixed: true
  parallel: true

pre-push:
  jobs:
    - name: biome-ci
      run: bun run biome:ci

    - name: oxc
      run: bun run oxc .

    - name: type-check
      run: bun run type-check

    - name: knip
      run: bun run knip

    - name: build
      run: bun run build
  parallel: true
